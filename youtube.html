<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Eight 動画ライブラリ</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; background: #f4f6f9; color: #333; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .search-container { margin-bottom: 20px; text-align: center; }
        .search-input { width: 100%; max-width: 500px; padding: 12px 20px; box-sizing: border-box; font-size: 16px; border: 2px solid #cbd5e0; border-radius: 25px; outline: none; transition: border-color 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .search-input:focus { border-color: #3182ce; }
        .playlist-container { margin-bottom: 12px; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); background-color: #ffffff; border: 1px solid #e2e8f0; }
        .playlist-header-wrapper { display: flex; align-items: center; justify-content: space-between; background-color: #ffffff; }
        .playlist-header { padding: 15px 20px; font-weight: bold; cursor: pointer; flex-grow: 1; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .playlist-header:hover { background-color: #edf2f7; }
        .playlist-header::after { content: '▶'; font-size: 12px; color: #718096; transition: transform 0.2s; margin-left: 10px; }
        .playlist-container.is-open .playlist-header::after { transform: rotate(90deg); }
        .playlist-main-link { padding: 15px 20px; font-size: 13px; color: #e53e3e; text-decoration: none; font-weight: bold; border-left: 1px solid #edf2f7; white-space: nowrap; transition: background 0.2s; }
        .playlist-main-link:hover { background-color: #fff5f5; text-decoration: underline; }
        .video-links { background-color: #f8fafc; border-top: 1px solid #edf2f7; display: none; padding: 10px 0; }
        .playlist-container.is-open .video-links { display: block; }
        .video-item { display: block; padding: 10px 30px; color: #3182ce; text-decoration: none; font-size: 15px; transition: background 0.2s; }
        .video-item:hover { background-color: #e2e8f0; text-decoration: underline; color: #2b6cb0; }
        .loading { padding: 15px 30px; color: #718096; font-style: italic; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Double Eight 動画ライブラリ</h2>
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="キーワードで動画・リストを検索...">
    </div>
    <div id="libraryContainer">
        <div class="loading" id="mainLoading">サークルサーバーから動画リストを安全に読み込み中...</div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyA6FUAusieqxRQpEym3WtEOjSr81C2O5mM';
    
    // 🔗 【重要】ステップ2でメモしたGASのウェブアプリURLをここに貼り付けます
    const GAS_API_URL = 'ここにウェブアプリのURLを貼り付ける';

    const libraryContainer = document.getElementById('libraryContainer');
    const searchInput = document.getElementById('searchInput');

    // GASの隠し部屋におねだりして限定公開リストをもらう
    fetch(GAS_API_URL)
        .then(res => res.json())
        .then(playlists => {
            document.getElementById('mainLoading').remove();
            playlists.forEach(list => {
                createPlaylistUI(list.name, list.id);
            });
        })
        .catch(err => {
            document.getElementById('mainLoading').innerText = '動画の読み込みに失敗しました。管理者設定を確認してください。';
        });

    function createPlaylistUI(name, id) {
        const containerDiv = document.createElement('div');
        containerDiv.className = 'playlist-container';
        containerDiv.setAttribute('data-name', name.toLowerCase());

        const wrapperDiv = document.createElement('div');
        wrapperDiv.className = 'playlist-header-wrapper';

        const headerDiv = document.createElement('div');
        headerDiv.className = 'playlist-header';
        headerDiv.innerText = `📂 ${name}`;

        const mainLink = document.createElement('a');
        mainLink.href = `https://www.youtube.com/playlist?list=${id}`;
        mainLink.target = '_blank';
        mainLink.rel = 'noopener noreferrer';
        mainLink.className = 'playlist-main-link';
        mainLink.innerText = 'https://script.google.com/macros/s/AKfycbzz-xIXBGc6pd0UVad1Lpq9lBb3H2OjL_e4SzcULUokESCn8OrHng1enmky3PMUb7dd/exec';

        wrapperDiv.appendChild(headerDiv);
        wrapperDiv.appendChild(mainLink);

        const videoLinksDiv = document.createElement('div');
        videoLinksDiv.className = 'video-links';
        videoLinksDiv.innerHTML = '<div class="loading">動画一覧を読み込み中...</div>';

        containerDiv.appendChild(wrapperDiv);
        containerDiv.appendChild(videoLinksDiv);
        libraryContainer.appendChild(containerDiv);

        headerDiv.addEventListener('click', () => {
            containerDiv.classList.toggle('is-open');
        });

        fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${id}&key=${API_KEY}`)
            .then(res => res.json())
            .then(data => {
                videoLinksDiv.innerHTML = '';
                if (data.items && data.items.length > 0) {
                    data.items.forEach(item => {
                        const videoTitle = item.snippet.title;
                        const videoId = item.snippet.resourceId.videoId;
                        aTag = document.createElement('a');
                        aTag.href = `https://www.youtube.com/watch?v=${videoId}`;
                        aTag.target = '_blank';
                        aTag.rel = 'noopener noreferrer';
                        aTag.className = 'video-item';
                        aTag.setAttribute('data-title', videoTitle.toLowerCase());
                        aTag.innerText = `🎬 ${videoTitle}`;
                        videoLinksDiv.appendChild(aTag);
                    });
                } else {
                    videoLinksDiv.innerHTML = '<div class="loading">動画がありません</div>';
                }
            })
            .catch(err => {
                videoLinksDiv.innerHTML = '<div class="loading">限定公開動画の取得に失敗しました</div>';
            });
    }

    // 🔍 検索処理
    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        const containers = document.querySelectorAll('.playlist-container');
        containers.forEach(container => {
            const playlistName = container.getAttribute('data-name');
            const videoItems = container.querySelectorAll('.video-item');
            if (query === '') {
                container.style.display = 'block';
                container.classList.remove('is-open');
                videoItems.forEach(item => item.style.display = 'block');
                return;
            }
            let hasMatchingVideo = false;
            videoItems.forEach(item => {
                const videoTitle = item.getAttribute('data-title');
                if (videoTitle && videoTitle.includes(query)) {
                    item.style.display = 'block';
                    hasMatchingVideo = true;
                } else {
                    item.style.display = 'none';
                }
            });
            if (playlistName.includes(query) || hasMatchingVideo) {
                container.style.display = 'block';
                container.classList.add('is-open');
                if (playlistName.includes(query) && !hasMatchingVideo) {
                    videoItems.forEach(item => item.style.display = 'block');
                }
            } else {
                container.style.display = 'none';
                container.classList.remove('is-open');
            }
        });
    });
</script>
</body>
</html>
